<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<center>

<form>

<table border="1" cellspacing="0" cellpadding="10" width="700">

<tr>
    <th colspan="2">
        <h1>Registration Form</h1>
    </th>
</tr>

<tr>
    <td>Student Name</td>
    <td>
        <input type="text" name="studentname" size="25">
    </td>
</tr>

<tr>
    <td>Father's Name</td>
    <td>
        <input type="text" name="fathername" size="25">
    </td>
</tr>

<tr>
    <td>Mother's Name</td>
    <td>
        <input type="text" name="mothername" size="25">
    </td>
</tr>

<tr>
    <td>Date of Birth</td>
    <td>
        <input type="date" name="dob">
    </td>
</tr>

<tr>
    <td>Gender</td>
    <td>
        Male
        <input type="radio" name="gender" value="Male">

        Female
        <input type="radio" name="gender" value="Female">
    </td>
</tr>

<tr>
    <td>Email ID</td>
    <td>
        <input type="email" name="email" size="25">
    </td>
</tr>

<tr>
    <td>Mobile No.</td>
    <td>
        <input type="tel" name="mobile" size="25">
    </td>
</tr>

<tr>
    <td>Address</td>
    <td>
        <textarea rows="5" cols="22"></textarea>
    </td>
</tr>

<tr>
    <td>State</td>
    <td>
        <input type="text" name="state" size="25">
    </td>
</tr>

<tr>
    <td>City</td>
    <td>
        <input type="text" name="city" size="25">
    </td>
</tr>

<tr>
    <td></td>
    <td>
        <input type="submit" value="Submit">
    </td>
</tr>

</table>

</form>

</center>

</body>
</html>
