<!DOCTYPE html>
<html>
<head>
<title>Doctor Appointment Form</title>
</head>
<body>

<table>
<tr>
<td><img src="assets/doctor.jpg" width="300"></td>
<td>

<h1>Doctor Appointment Form</h1>
<hr>

<form>

  <p>Appointment Date:
  <input type="date"></p>

  <p>Appointment Time:
  <input type="time"></p>

  <p>Name:
  <input type="text" placeholder="First">
  <input type="text" placeholder="Last"></p>

  <p>Gender:
  Male <input type="radio" name="gender">
  Female <input type="radio" name="gender"></p>

  <p>Phone:
  <input type="tel" placeholder="####"></p>

  <p>Address:
  <input type="text" placeholder="city">
  <input type="text" placeholder="state"></p>

  <p>Your Query:<br>
  <textarea rows="5" cols="50"></textarea></p>

  <p>Appointment Type:<br>
  Select which appointment type(s) you require<br>
  <input type="checkbox"> Cervix checkup<br>
  <input type="checkbox"> Heart checkup<br>
  <input type="checkbox"> Eye check-up<br>
  <input type="checkbox"> Hearing Test</p>

  <input type="submit" value="Send">

</form>

</td>
</tr>
</table>

</body>
</html>
